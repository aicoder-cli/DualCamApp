<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DualCam · 推荐视频</title>
  <style>
    :root {
      --bg: #050608;
      --text: #f5f5f7;
      --muted: rgba(245,245,247,0.64);
      --faint: rgba(245,245,247,0.38);
      --line: rgba(255,255,255,0.13);
      --panel: rgba(255,255,255,0.07);
      --accent: #d6ff4d;
      --accent-soft: rgba(214,255,77,0.16);
      --record: #ff453a;
      --mono: "SF Mono", ui-monospace, Menlo, Monaco, Consolas, monospace;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #000; }
    body { font-family: var(--font); color: var(--text); display: grid; place-items: center; }
    .stage { width: 1080px; height: 1920px; position: relative; overflow: hidden; background: var(--bg); transform-origin: center; }
    .stage::before { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 50% 20%, rgba(214,255,77,0.16), transparent 28%), radial-gradient(circle at 40% 82%, rgba(214,255,77,0.10), transparent 34%); }
    .stage::after { content: ""; position: absolute; inset: 0; background: linear-gradient(126deg, transparent 0 49%, rgba(214,255,77,0.22) 50%, transparent 51%); opacity: 0.75; }
    .scene { position: absolute; inset: 0; z-index: 1; opacity: 0; transform: translateY(40px); }
    body.play .scene { animation-duration: 15s; animation-fill-mode: both; animation-timing-function: cubic-bezier(.16,1,.3,1); }
    .brand { animation-name: brandScene; }
    .capture { animation-name: captureScene; }
    .layouts { animation-name: layoutsScene; }
    .proof { animation-name: proofScene; }
    .closing { animation-name: closingScene; }
    @keyframes brandScene { 0%, 12% { opacity: 1; transform: translateY(0) scale(1); } 16%, 100% { opacity: 0; transform: translateY(-26px) scale(1.04); } }
    @keyframes captureScene { 0%, 13% { opacity: 0; transform: translateY(120px); } 18%, 33% { opacity: 1; transform: translateY(0); } 37%, 100% { opacity: 0; transform: translateY(-34px); } }
    @keyframes layoutsScene { 0%, 34% { opacity: 0; transform: translateY(110px); } 40%, 54% { opacity: 1; transform: translateY(0); } 58%, 100% { opacity: 0; transform: translateY(-34px); } }
    @keyframes proofScene { 0%, 55% { opacity: 0; transform: translateY(120px); } 62%, 75% { opacity: 1; transform: translateY(0); } 80%, 100% { opacity: 0; transform: translateY(-32px); } }
    @keyframes closingScene { 0%, 77% { opacity: 0; transform: translateY(90px) scale(.98); } 86%, 100% { opacity: 1; transform: translateY(0) scale(1); } }
    .center { position: absolute; left: 92px; right: 92px; text-align: center; display: grid; justify-items: center; }
    .icon { width: 190px; height: 190px; border-radius: 52px; box-shadow: 0 38px 110px rgba(214,255,77,0.22); }
    .kicker { color: var(--accent); font-size: 25px; font-weight: 800; letter-spacing: .22em; text-transform: uppercase; }
    .headline { font-size: 96px; line-height: .92; letter-spacing: -.08em; font-weight: 850; margin: 0; }
    .sub { color: var(--muted); font-size: 28px; line-height: 1.45; margin: 0; }
    .brand .center { top: 425px; }
    .brand .icon { margin-bottom: 56px; }
    .brand .kicker { margin-bottom: 28px; }
    .section-copy { position: absolute; left: 82px; top: 150px; right: 82px; z-index: 3; }
    .section-copy .kicker { font-size: 24px; margin-bottom: 28px; }
    .section-copy .headline { font-size: 82px; }
    .bullet-stack { position: absolute; left: 86px; bottom: 232px; display: grid; gap: 15px; z-index: 4; }
    .bullet { width: 382px; padding: 15px 18px; border-radius: 22px; background: var(--panel); border: 1px solid var(--line); color: rgba(245,245,247,.78); font-size: 26px; }
    .bullet:nth-child(2) { color: var(--accent); background: var(--accent-soft); }
    .phone { width: 386px; height: 812px; padding: 12px; border-radius: 58px; background: #000; box-shadow: 0 42px 110px rgba(0,0,0,.56); position: absolute; right: 74px; top: 520px; transform: rotate(2deg); z-index: 3; }
    .island { position: absolute; top: 24px; left: 50%; width: 124px; height: 36px; transform: translateX(-50%); border-radius: 999px; background: #000; z-index: 9; }
    .screen { position: relative; width: 100%; height: 100%; border-radius: 46px; overflow: hidden; background: #050608; }
    .feed { position: absolute; overflow: hidden; padding: 18px; color: rgba(255,255,255,.76); font: 800 12px/1 var(--mono); letter-spacing: .12em; display: flex; align-items: flex-end; }
    .rear { background: linear-gradient(145deg,#263348 0%,#07080a 42%,#566a83 100%); }
    .rear::before { content: ""; position: absolute; inset: -18%; background: radial-gradient(circle at 72% 28%, rgba(255,255,255,.18), transparent 22%), linear-gradient(120deg, transparent 0 45%, rgba(214,255,77,.10) 46% 48%, transparent 49%); }
    .front { background: linear-gradient(145deg,#644231 0%,#19110d 48%,#7a503d 100%); box-shadow: 0 20px 56px rgba(0,0,0,.38), inset 0 0 0 1px rgba(255,255,255,.14); }
    .feed span { position: relative; z-index: 1; }
    .screen.pip .rear, .screen.focus .rear { inset: 0; }
    .screen.pip .front { width: 34%; height: 30%; right: 18px; top: 84px; border-radius: 28px; z-index: 3; border: 1px solid rgba(255,255,255,.24); }
    .screen.side .rear { inset: 0 50% 0 0; }
    .screen.side .front { inset: 0 0 0 50%; }
    .screen.topBottom .rear { inset: 0 0 50% 0; }
    .screen.topBottom .front { inset: 50% 0 0 0; }
    .screen.diagonal .rear { inset: 0; clip-path: polygon(0 0,74% 0,38% 100%,0 100%); }
    .screen.diagonal .front { inset: 0; clip-path: polygon(74% 0,100% 0,100% 100%,38% 100%); }
    .screen.focus .front { left: 20px; right: 20px; bottom: 24px; height: 22%; border-radius: 24px; z-index: 3; border: 1px solid rgba(255,255,255,.24); }
    .hud { position: absolute; left: 20px; top: 18px; display: flex; gap: 8px; z-index: 5; }
    .pill { padding: 8px 10px; border-radius: 999px; color: rgba(245,245,247,.72); background: rgba(0,0,0,.36); border: 1px solid rgba(255,255,255,.12); font: 800 12px/1 var(--mono); letter-spacing: .08em; }
    .pill.rec { color: var(--record); background: rgba(255,69,58,.16); }
    .layout-rail { position: absolute; left: 16px; right: 16px; bottom: 102px; display: flex; gap: 8px; z-index: 6; }
    .layout-chip { flex: 1; height: 42px; border-radius: 15px; border: 1px solid rgba(255,255,255,.12); background: rgba(5,6,8,.52); }
    .layout-chip.active { background: var(--accent-soft); border-color: rgba(214,255,77,.75); }
    .shutter-zone { position: absolute; left: 0; right: 0; bottom: 0; height: 102px; display: grid; place-items: center; background: linear-gradient(0deg,rgba(5,6,8,.96),transparent); z-index: 6; }
    .shutter { width: 76px; height: 76px; border-radius: 999px; background: #fff; box-shadow: 0 0 0 5px #050608,0 0 0 7px rgba(255,255,255,.72); position: relative; }
    .shutter::after { content: ""; position: absolute; inset: 25px; border-radius: 9px; background: var(--record); }
    .layout-grid { position: absolute; left: 74px; right: 74px; top: 610px; display: grid; grid-template-columns: repeat(2,1fr); gap: 22px; z-index: 3; }
    .layout-card { height: 235px; border-radius: 34px; padding: 12px; background: var(--panel); border: 1px solid var(--line); position: relative; }
    .layout-card:nth-child(2) { transform: translateY(-14px); border-color: rgba(214,255,77,.78); background: var(--accent-soft); }
    .layout-card .screen { border-radius: 24px; border: 1px solid rgba(255,255,255,.12); }
    .proof-strip { position: absolute; left: 74px; top: 642px; display: flex; gap: 34px; z-index: 3; }
    .proof-strip img { width: 322px; height: 700px; object-fit: cover; object-position: top center; border-radius: 42px; border: 1px solid rgba(255,255,255,.16); box-shadow: 0 38px 100px rgba(0,0,0,.52); }
    .proof-strip img:nth-child(1) { transform: rotate(-6deg); }
    .proof-strip img:nth-child(2) { transform: rotate(2deg) translateY(-52px); }
    .proof-strip img:nth-child(3) { transform: rotate(7deg); }
    .closing .center { top: 410px; }
    .closing img { width: 172px; height: 172px; margin-bottom: 58px; filter: drop-shadow(0 30px 80px rgba(214,255,77,.24)); }
    .closing .headline { margin-bottom: 40px; }
    @media (max-aspect-ratio: 9/16) { .stage { transform: scale(calc(100vw / 1080)); } }
    @media (min-aspect-ratio: 9/16) { .stage { transform: scale(calc(100vh / 1920)); } }
  </style>
</head>
<body>
  <main class="stage" aria-label="DualCam promo animation">
    <section class="scene brand">
      <div class="center">
        <img class="icon" src="assets/app-icon-1024.png" alt="DualCam">
        <div class="kicker">DualCam</div>
        <h1 class="headline">前后双视角<br>同步录制</h1>
      </div>
    </section>

    <section class="scene capture">
      <div class="section-copy">
        <div class="kicker">Live Capture</div>
        <h2 class="headline">一个快门<br>两路现场</h2>
      </div>
      <div class="phone">
        <div class="island"></div>
        <div class="screen pip">
          <div class="feed rear"><span>REAR</span></div>
          <div class="feed front"><span>FRONT</span></div>
          <div class="hud"><span class="pill rec">REC 00:08</span><span class="pill">SYNC</span><span class="pill">1080P</span></div>
          <div class="layout-rail"><i class="layout-chip active"></i><i class="layout-chip"></i><i class="layout-chip"></i><i class="layout-chip"></i></div>
          <div class="shutter-zone"><div class="shutter"></div></div>
        </div>
      </div>
      <div class="bullet-stack"><div class="bullet">后置记录现场</div><div class="bullet">前置记录反应</div><div class="bullet">自动合成 MP4</div></div>
    </section>

    <section class="scene layouts">
      <div class="section-copy">
        <div class="kicker">Six Layouts</div>
        <h2 class="headline">录制中<br>也能换构图</h2>
      </div>
      <div class="layout-grid">
        <div class="layout-card"><div class="screen pip"><div class="feed rear"><span>REAR</span></div><div class="feed front"><span>FRONT</span></div></div></div>
        <div class="layout-card"><div class="screen side"><div class="feed rear"><span>REAR</span></div><div class="feed front"><span>FRONT</span></div></div></div>
        <div class="layout-card"><div class="screen topBottom"><div class="feed rear"><span>REAR</span></div><div class="feed front"><span>FRONT</span></div></div></div>
        <div class="layout-card"><div class="screen diagonal"><div class="feed rear"><span>REAR</span></div><div class="feed front"><span>FRONT</span></div></div></div>
        <div class="layout-card"><div class="screen focus"><div class="feed rear"><span>REAR</span></div><div class="feed front"><span>FRONT</span></div></div></div>
      </div>
    </section>

    <section class="scene proof">
      <div class="section-copy">
        <div class="kicker">Product Proof</div>
        <h2 class="headline">真实界面资产<br>直接进入文档</h2>
      </div>
      <div class="proof-strip">
        <img src="assets/appstore-zh-01.png" alt="DualCam App Store screenshot 1">
        <img src="assets/appstore-zh-03.png" alt="DualCam App Store screenshot 2">
        <img src="assets/appstore-zh-06.png" alt="DualCam App Store screenshot 3">
      </div>
    </section>

    <section class="scene closing">
      <div class="center">
        <img src="assets/dualcam-app-icon-split.svg" alt="DualCam icon">
        <h2 class="headline">即刻记录<br>完整现场</h2>
        <p class="sub">iOS 15+ · 双摄同步 · 自动保存到相册</p>
      </div>
    </section>
  </main>
  <script>
    function start() {
      document.body.classList.add('play');
      window.__ready = true;
    }
    window.__setTime = function () {};
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(function () { requestAnimationFrame(start); });
    } else {
      requestAnimationFrame(start);
    }
  </script>
</body>
</html>
