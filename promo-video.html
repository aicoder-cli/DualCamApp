<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>双摄录像 · 推荐视频</title>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; background: #000; }
    body { font-family: -apple-system, 'SF Pro Display', 'PingFang SC', sans-serif; }
    #root { width: 100%; height: 100%; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useContext, createContext, useCallback } = React;

// ═══════════════════════════════════════════════════════════
// ANIMATION ENGINE (inline — file:// safe)
// ═══════════════════════════════════════════════════════════

const TimeContext = createContext({ time: 0, duration: 15, playing: false });
const SpriteContext = createContext(null);

const Easing = {
  linear: t => t,
  easeOut: t => 1 - (1 - t) * (1 - t),
  easeIn: t => t * t,
  easeInOut: t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2,
  expoOut: t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t),
  overshoot: t => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  spring: t => {
    const c = (2 * Math.PI) / 3;
    return t === 0 ? 0 : t === 1 ? 1 : Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c) + 1;
  },
};

function interpolate(t, input, output, easing) {
  const [inStart, inEnd] = input;
  const [outStart, outEnd] = output;
  if (t <= inStart) return outStart;
  if (t >= inEnd) return outEnd;
  let p = (t - inStart) / (inEnd - inStart);
  if (easing) p = easing(p);
  return outStart + (outEnd - outStart) * p;
}

function useTime() { return useContext(TimeContext).time; }
function useSprite() { return useContext(SpriteContext) || { t: 0, elapsed: 0, duration: 1 }; }

function Stage({ duration = 15, width = 1080, height = 1920, loop = true, children, bgColor = '#0a0a0f' }) {
  const [time, setTime] = useState(0);
  const [playing, setPlaying] = useState(true);
  const [scale, setScale] = useState(1);
  const rafRef = useRef(null);

  const effectiveLoop = (typeof window !== 'undefined' && window.__recording) ? false : loop;

  useEffect(() => {
    const updateScale = () => {
      const s = Math.min(window.innerWidth / width, window.innerHeight / height);
      setScale(s);
    };
    updateScale();
    window.addEventListener('resize', updateScale);
    return () => window.removeEventListener('resize', updateScale);
  }, [width, height]);

  useEffect(() => {
    if (!playing) return;
    let cancelled = false, last = null;
    function tick(now) {
      if (cancelled) return;
      if (last === null) { last = now; if (typeof window !== 'undefined') window.__ready = true; }
      const delta = (now - last) / 1000;
      last = now;
      setTime(prev => {
        const next = prev + delta;
        if (next >= duration) return effectiveLoop ? 0 : duration - 0.001;
        return next;
      });
      rafRef.current = requestAnimationFrame(tick);
    }
    const start = () => { if (!cancelled) rafRef.current = requestAnimationFrame(tick); };
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(start); else start();
    return () => { cancelled = true; cancelAnimationFrame(rafRef.current); };
  }, [playing, duration, effectiveLoop]);

  const handleScrub = useCallback((e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    setTime(Math.max(0, Math.min(duration, ((e.clientX - rect.left) / rect.width) * duration)));
  }, [duration]);

  const progress = time / duration;
  const ctx = { time, duration, playing, setPlaying, setTime };
  if (typeof window !== 'undefined') window.__setTime = setTime;

  return (
    <TimeContext.Provider value={ctx}>
      <div style={{ position: 'fixed', inset: 0, background: '#000', display: 'flex', flexDirection: 'column' }}>
        <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
          <div style={{
            position: 'absolute', top: '50%', left: '50%',
            width, height, background: bgColor,
            transform: `translate(-50%, -50%) scale(${scale})`,
            transformOrigin: 'center center',
            overflow: 'hidden',
          }}>
            {children}
          </div>
        </div>
        {/* Controls */}
        <div className="no-record" style={{
          position: 'fixed', bottom: 0, left: 0, right: 0,
          background: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(10px)',
          padding: '14px 24px', display: 'flex', alignItems: 'center', gap: 14,
          color: '#fff', fontSize: 12, zIndex: 100,
        }}>
          <button onClick={() => setPlaying(p => !p)} style={{
            background: 'none', border: '1px solid rgba(255,255,255,0.3)',
            color: '#fff', padding: '6px 14px', borderRadius: 4, cursor: 'pointer', fontSize: 12,
          }}>{playing ? '暂停' : '播放'}</button>
          <button onClick={() => { setTime(0); setPlaying(true); }} style={{
            background: 'none', border: '1px solid rgba(255,255,255,0.3)',
            color: '#fff', padding: '6px 14px', borderRadius: 4, cursor: 'pointer', fontSize: 12,
          }}>重播</button>
          <span style={{ fontFamily: 'ui-monospace, monospace', fontVariantNumeric: 'tabular-nums', minWidth: 100 }}>
            {time.toFixed(1)}s / {duration.toFixed(1)}s
          </span>
          <div onMouseDown={(e) => { handleScrub(e); setPlaying(false); }} style={{
            flex: 1, height: 4, background: 'rgba(255,255,255,0.2)',
            borderRadius: 2, position: 'relative', cursor: 'pointer',
          }}>
            <div style={{ position: 'absolute', top: 0, left: 0, height: '100%', width: `${progress * 100}%`, background: '#fff', borderRadius: 2 }} />
          </div>
        </div>
      </div>
    </TimeContext.Provider>
  );
}

function Sprite({ start = 0, end, children, style }) {
  const { time } = useContext(TimeContext);
  const actualEnd = end == null ? Infinity : end;
  if (time < start || time >= actualEnd) return null;
  const dur = actualEnd - start;
  const elapsed = time - start;
  const t = dur === 0 ? 1 : Math.max(0, Math.min(1, elapsed / dur));
  return (
    <SpriteContext.Provider value={{ t, elapsed, duration: dur, start, end: actualEnd }}>
      <div style={{ position: 'absolute', inset: 0, ...style }}>{children}</div>
    </SpriteContext.Provider>
  );
}

// ═══════════════════════════════════════════════════════════
// DESIGN TOKENS
// ═══════════════════════════════════════════════════════════

const C = {
  bg: '#0a0a0f',
  accent1: '#667eea',
  accent2: '#764ba2',
  recordRed: '#F2404C',
  white: '#ffffff',
  white60: 'rgba(255,255,255,0.6)',
  white30: 'rgba(255,255,255,0.3)',
  white10: 'rgba(255,255,255,0.1)',
  white05: 'rgba(255,255,255,0.05)',
  glass: 'rgba(255,255,255,0.08)',
  glassBorder: 'rgba(255,255,255,0.15)',
};

const gradAccent = `linear-gradient(135deg, ${C.accent1}, ${C.accent2})`;

// ═══════════════════════════════════════════════════════════
// SCENE 1: OPENING (0-3s)
// ═══════════════════════════════════════════════════════════

function SceneOpening() {
  const sp = useSprite();
  const titleOpacity = interpolate(sp.t, [0, 0.3], [0, 1], Easing.easeOut);
  const titleY = interpolate(sp.t, [0, 0.4], [40, 0], Easing.expoOut);
  const subtitleOpacity = interpolate(sp.t, [0.3, 0.6], [0, 1], Easing.easeOut);
  const subtitleY = interpolate(sp.t, [0.3, 0.7], [20, 0], Easing.expoOut);
  const lineScale = interpolate(sp.t, [0.2, 0.6], [0, 1], Easing.easeOut);
  const glowOpacity = interpolate(sp.t, [0.1, 0.5], [0, 0.3], Easing.easeOut);

  return (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center',
      background: C.bg,
      position: 'relative',
    }}>
      {/* Background glow */}
      <div style={{
        position: 'absolute', top: '35%', left: '50%', transform: 'translate(-50%, -50%)',
        width: 400, height: 400, borderRadius: '50%',
        background: `radial-gradient(circle, ${C.accent1}40 0%, transparent 70%)`,
        opacity: glowOpacity,
        filter: 'blur(60px)',
      }} />

      {/* App icon */}
      <div style={{
        width: 100, height: 100, borderRadius: 24,
        background: gradAccent,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        marginBottom: 40,
        opacity: titleOpacity,
        transform: `translateY(${titleY}px)`,
        boxShadow: `0 8px 32px ${C.accent1}60`,
      }}>
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="4" y="8" width="28" height="20" rx="4" stroke="white" strokeWidth="2.5" fill="none" />
          <rect x="16" y="20" width="28" height="20" rx="4" stroke="white" strokeWidth="2.5" fill="white" fillOpacity="0.2" />
          <circle cx="18" cy="18" r="5" fill="white" fillOpacity="0.9" />
        </svg>
      </div>

      {/* Title */}
      <div style={{
        fontSize: 52, fontWeight: 700, color: C.white,
        letterSpacing: 2,
        opacity: titleOpacity,
        transform: `translateY(${titleY}px)`,
        textShadow: `0 2px 20px ${C.accent1}40`,
      }}>
        双摄录像
      </div>

      {/* Accent line */}
      <div style={{
        width: 60 * lineScale, height: 3,
        background: gradAccent,
        borderRadius: 2,
        marginTop: 20,
        opacity: subtitleOpacity,
      }} />

      {/* Subtitle */}
      <div style={{
        fontSize: 22, fontWeight: 400, color: C.white60,
        marginTop: 24,
        opacity: subtitleOpacity,
        transform: `translateY(${subtitleY}px)`,
        letterSpacing: 4,
      }}>
        前后双摄 · 一键录制
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// SCENE 2: DUAL CAMERA HERO (3-6s)
// ═══════════════════════════════════════════════════════════

function SceneDualCamera() {
  const sp = useSprite();

  // Phone frame entrance
  const phoneScale = interpolate(sp.t, [0, 0.5], [0.8, 1], Easing.overshoot);
  const phoneOpacity = interpolate(sp.t, [0, 0.3], [0, 1], Easing.easeOut);

  // Back camera "turns on"
  const backOpacity = interpolate(sp.t, [0.2, 0.5], [0, 1], Easing.easeOut);

  // Front camera slides in
  const frontX = interpolate(sp.t, [0.4, 0.7], [300, 0], Easing.expoOut);
  const frontOpacity = interpolate(sp.t, [0.4, 0.6], [0, 1], Easing.easeOut);
  const frontScale = interpolate(sp.t, [0.4, 0.7], [0.6, 1], Easing.overshoot);

  // Label
  const labelOpacity = interpolate(sp.t, [0.6, 0.85], [0, 1], Easing.easeOut);
  const labelY = interpolate(sp.t, [0.6, 0.9], [15, 0], Easing.expoOut);

  return (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center',
      background: C.bg,
      position: 'relative',
    }}>
      {/* Ambient glow */}
      <div style={{
        position: 'absolute', top: '30%', left: '50%', transform: 'translate(-50%, -50%)',
        width: 500, height: 500, borderRadius: '50%',
        background: `radial-gradient(circle, ${C.accent2}30 0%, transparent 70%)`,
        opacity: 0.5, filter: 'blur(80px)',
      }} />

      {/* Phone mockup */}
      <div style={{
        width: 280, height: 560,
        background: '#000', borderRadius: 40,
        border: '3px solid #333',
        padding: 8,
        opacity: phoneOpacity,
        transform: `scale(${phoneScale})`,
        boxShadow: '0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05)',
        position: 'relative',
        overflow: 'hidden',
      }}>
        {/* Dynamic Island */}
        <div style={{
          position: 'absolute', top: 8, left: '50%', transform: 'translateX(-50%)',
          width: 90, height: 26, background: '#000', borderRadius: 999, zIndex: 10,
        }} />

        {/* Screen content */}
        <div style={{
          width: '100%', height: '100%',
          borderRadius: 32, overflow: 'hidden',
          position: 'relative',
        }}>
          {/* Back camera feed (simulated) */}
          <div style={{
            position: 'absolute', inset: 0,
            background: `linear-gradient(160deg, #1a3a2a 0%, #0d2818 40%, #2d5a3d 100%)`,
            opacity: backOpacity,
            transition: 'opacity 0.3s',
          }}>
            {/* Scenery elements */}
            <div style={{ position: 'absolute', bottom: '25%', left: '15%', width: 50, height: 100, background: 'linear-gradient(180deg, #2d5a3d, #1a3a2a)', borderRadius: '50% 50% 0 0' }} />
            <div style={{ position: 'absolute', bottom: '20%', right: '10%', width: 70, height: 140, background: 'linear-gradient(180deg, #3d6a4d, #2d5a3d)', borderRadius: '50% 50% 0 0' }} />
            <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: '50%', background: 'linear-gradient(180deg, transparent, rgba(0,0,0,0.4))' }} />
          </div>

          {/* Front camera PiP */}
          <div style={{
            position: 'absolute', right: 12, bottom: 100,
            width: 90, height: 120, borderRadius: 14,
            overflow: 'hidden',
            border: `2px solid ${C.white30}`,
            boxShadow: '0 4px 16px rgba(0,0,0,0.4)',
            opacity: frontOpacity,
            transform: `translateX(${frontX}px) scale(${frontScale})`,
            background: `linear-gradient(135deg, #ff9a9e, #fecfef)`,
          }}>
            <div style={{
              position: 'absolute', bottom: 8, left: '50%', transform: 'translateX(-50%)',
              fontSize: 9, color: '#fff', fontWeight: 600,
              textShadow: '0 1px 4px rgba(0,0,0,0.5)',
            }}>前置</div>
          </div>

          {/* Top gradient */}
          <div style={{
            position: 'absolute', top: 0, left: 0, right: 0, height: 80,
            background: 'linear-gradient(180deg, rgba(0,0,0,0.5), transparent)',
          }} />
        </div>
      </div>

      {/* Label */}
      <div style={{
        marginTop: 50, textAlign: 'center',
        opacity: labelOpacity,
        transform: `translateY(${labelY}px)`,
      }}>
        <div style={{ fontSize: 26, fontWeight: 600, color: C.white, letterSpacing: 1 }}>
          同时调用前后摄像头
        </div>
        <div style={{ fontSize: 16, color: C.white60, marginTop: 12, letterSpacing: 2 }}>
          两个视角 · 一个视频
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// SCENE 3: LAYOUT SHOWCASE (6-9s)
// ═══════════════════════════════════════════════════════════

const LAYOUTS = [
  { name: '画中画', icon: '◻' },
  { name: '左右分屏', icon: '⬜' },
  { name: '上下分屏', icon: '▬' },
  { name: '对角', icon: '⬚' },
  { name: '后置主屏', icon: '📷' },
  { name: '前置主屏', icon: '🤳' },
];

function SceneLayouts() {
  const sp = useSprite();

  // Title
  const titleOpacity = interpolate(sp.t, [0, 0.25], [0, 1], Easing.easeOut);
  const titleY = interpolate(sp.t, [0, 0.3], [20, 0], Easing.expoOut);

  return (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center',
      background: C.bg,
      position: 'relative',
    }}>
      {/* Title */}
      <div style={{
        fontSize: 28, fontWeight: 600, color: C.white,
        marginBottom: 60,
        opacity: titleOpacity,
        transform: `translateY(${titleY}px)`,
        letterSpacing: 2,
      }}>
        6 种布局 · 随心切换
      </div>

      {/* Layout grid */}
      <div style={{
        display: 'grid',
        gridTemplateColumns: 'repeat(3, 1fr)',
        gap: 20,
        padding: '0 40px',
      }}>
        {LAYOUTS.map((layout, i) => {
          const delay = 0.1 + i * 0.08;
          const itemOpacity = interpolate(sp.t, [delay, delay + 0.2], [0, 1], Easing.easeOut);
          const itemY = interpolate(sp.t, [delay, delay + 0.3], [30, 0], Easing.expoOut);
          const itemScale = interpolate(sp.t, [delay, delay + 0.3], [0.85, 1], Easing.overshoot);
          const isActive = sp.t > delay + 0.15 && sp.t < delay + 0.6;

          return (
            <div key={layout.name} style={{
              width: 160, height: 140,
              background: isActive ? `linear-gradient(135deg, ${C.accent1}30, ${C.accent2}30)` : C.glass,
              border: `1.5px solid ${isActive ? `${C.accent1}80` : C.glassBorder}`,
              borderRadius: 18,
              display: 'flex', flexDirection: 'column',
              alignItems: 'center', justifyContent: 'center',
              gap: 10,
              opacity: itemOpacity,
              transform: `translateY(${itemY}px) scale(${itemScale})`,
              transition: 'background 0.3s, border-color 0.3s',
              boxShadow: isActive ? `0 4px 20px ${C.accent1}30` : 'none',
            }}>
              <div style={{
                width: 44, height: 44, borderRadius: 12,
                background: isActive ? gradAccent : C.white10,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 22,
              }}>
                {layout.icon}
              </div>
              <div style={{
                fontSize: 15, fontWeight: 500,
                color: isActive ? C.white : C.white60,
              }}>
                {layout.name}
              </div>
            </div>
          );
        })}
      </div>

      {/* Bottom hint */}
      {(() => {
        const hintOpacity = interpolate(sp.t, [0.7, 0.9], [0, 1], Easing.easeOut);
        return (
          <div style={{
            position: 'absolute', bottom: 120,
            fontSize: 15, color: C.white60,
            opacity: hintOpacity,
            letterSpacing: 1,
          }}>
            录制中也能实时切换
          </div>
        );
      })()}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// SCENE 4: RECORDING EXPERIENCE (9-12s)
// ═══════════════════════════════════════════════════════════

function SceneRecording() {
  const sp = useSprite();

  // Record button press
  const btnScale = interpolate(sp.t, [0.2, 0.35], [1, 0.88], Easing.easeIn);
  const btnScaleBack = interpolate(sp.t, [0.35, 0.5], [0.88, 1, 0], Easing.spring);
  const btnScaleFinal = sp.t < 0.35 ? btnScale : btnScaleBack;
  const isRecording = sp.t > 0.4;

  // Timer
  const timerOpacity = interpolate(sp.t, [0.4, 0.6], [0, 1], Easing.easeOut);
  const seconds = Math.floor((sp.t - 0.4) * 3);
  const timerStr = `00:${String(seconds).padStart(2, '0')}`;

  // Pulse ring
  const pulseScale = interpolate(sp.t, [0.4, 1], [1, 1.6], Easing.linear);
  const pulseOpacity = interpolate(sp.t, [0.4, 1], [0.5, 0], Easing.easeOut);

  // Label
  const labelOpacity = interpolate(sp.t, [0.1, 0.3], [0, 1], Easing.easeOut);

  return (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center',
      background: C.bg,
      position: 'relative',
    }}>
      {/* Ambient red glow when recording */}
      {isRecording && (
        <div style={{
          position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)',
          width: 300, height: 300, borderRadius: '50%',
          background: `radial-gradient(circle, ${C.recordRed}20 0%, transparent 70%)`,
          filter: 'blur(50px)',
        }} />
      )}

      {/* Label */}
      <div style={{
        fontSize: 24, fontWeight: 600, color: C.white,
        marginBottom: 80,
        opacity: labelOpacity,
        letterSpacing: 2,
      }}>
        一键录制
      </div>

      {/* Record button */}
      <div style={{
        width: 100, height: 100,
        borderRadius: '50%',
        border: `3px solid ${isRecording ? C.recordRed : C.white30}`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        position: 'relative',
        transform: `scale(${btnScaleFinal})`,
      }}>
        {/* Pulse ring */}
        {isRecording && (
          <div style={{
            position: 'absolute',
            width: 100, height: 100,
            borderRadius: '50%',
            border: `2px solid ${C.recordRed}`,
            opacity: pulseOpacity,
            transform: `scale(${pulseScale})`,
          }} />
        )}

        {/* Inner */}
        <div style={{
          width: isRecording ? 40 : 80,
          height: isRecording ? 40 : 80,
          borderRadius: isRecording ? 10 : '50%',
          background: C.recordRed,
          transition: 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)',
          boxShadow: isRecording ? `0 0 30px ${C.recordRed}80` : 'none',
        }} />
      </div>

      {/* Timer pill */}
      <div style={{
        marginTop: 50,
        display: 'flex', alignItems: 'center', gap: 10,
        padding: '12px 24px',
        background: 'rgba(255,255,255,0.08)',
        backdropFilter: 'blur(20px)',
        borderRadius: 999,
        border: `1px solid ${C.glassBorder}`,
        opacity: timerOpacity,
      }}>
        <div style={{
          width: 10, height: 10, borderRadius: '50%',
          background: C.recordRed,
          boxShadow: `0 0 8px ${C.recordRed}`,
        }} />
        <span style={{
          fontSize: 20, fontWeight: 600, color: C.white,
          fontFamily: 'ui-monospace, monospace',
          fontVariantNumeric: 'tabular-nums',
          letterSpacing: 2,
        }}>
          {timerStr}
        </span>
      </div>

      {/* Bottom hint */}
      {(() => {
        const hOpacity = interpolate(sp.t, [0.6, 0.8], [0, 1], Easing.easeOut);
        return (
          <div style={{
            position: 'absolute', bottom: 120,
            fontSize: 15, color: C.white60,
            opacity: hOpacity,
            letterSpacing: 1,
          }}>
            自动保存到相册
          </div>
        );
      })()}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// SCENE 5: CLOSING (12-15s)
// ═══════════════════════════════════════════════════════════

function SceneClosing() {
  const sp = useSprite();

  const iconOpacity = interpolate(sp.t, [0, 0.3], [0, 1], Easing.easeOut);
  const iconScale = interpolate(sp.t, [0, 0.4], [0.8, 1], Easing.overshoot);
  const titleOpacity = interpolate(sp.t, [0.2, 0.5], [0, 1], Easing.easeOut);
  const titleY = interpolate(sp.t, [0.2, 0.5], [20, 0], Easing.expoOut);

  // Feature pills
  const pills = ['双摄同步', '6种布局', '实时拖拽', '一键保存'];
  const pillOpacity = interpolate(sp.t, [0.4, 0.7], [0, 1], Easing.easeOut);

  // CTA
  const ctaOpacity = interpolate(sp.t, [0.6, 0.85], [0, 1], Easing.easeOut);
  const ctaScale = interpolate(sp.t, [0.6, 0.8], [0.9, 1], Easing.overshoot);
  const ctaY = interpolate(sp.t, [0.6, 0.85], [20, 0], Easing.expoOut);

  return (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center',
      background: C.bg,
      position: 'relative',
    }}>
      {/* Glow */}
      <div style={{
        position: 'absolute', top: '25%', left: '50%', transform: 'translate(-50%, -50%)',
        width: 500, height: 500, borderRadius: '50%',
        background: `radial-gradient(circle, ${C.accent1}25 0%, ${C.accent2}15 40%, transparent 70%)`,
        filter: 'blur(60px)',
      }} />

      {/* App icon */}
      <div style={{
        width: 90, height: 90, borderRadius: 22,
        background: gradAccent,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        marginBottom: 32,
        opacity: iconOpacity,
        transform: `scale(${iconScale})`,
        boxShadow: `0 8px 32px ${C.accent1}50`,
      }}>
        <svg width="42" height="42" viewBox="0 0 48 48" fill="none">
          <rect x="4" y="8" width="28" height="20" rx="4" stroke="white" strokeWidth="2.5" fill="none" />
          <rect x="16" y="20" width="28" height="20" rx="4" stroke="white" strokeWidth="2.5" fill="white" fillOpacity="0.2" />
          <circle cx="18" cy="18" r="5" fill="white" fillOpacity="0.9" />
        </svg>
      </div>

      {/* Title */}
      <div style={{
        fontSize: 44, fontWeight: 700, color: C.white,
        letterSpacing: 2,
        opacity: titleOpacity,
        transform: `translateY(${titleY}px)`,
        textShadow: `0 2px 20px ${C.accent1}30`,
      }}>
        双摄录像
      </div>

      {/* Feature pills */}
      <div style={{
        display: 'flex', gap: 12, marginTop: 36,
        opacity: pillOpacity,
      }}>
        {pills.map((pill, i) => {
          const pDelay = 0.4 + i * 0.06;
          const pOpacity = interpolate(sp.t, [pDelay, pDelay + 0.2], [0, 1], Easing.easeOut);
          const pY = interpolate(sp.t, [pDelay, pDelay + 0.25], [10, 0], Easing.expoOut);
          return (
            <div key={pill} style={{
              padding: '8px 18px',
              background: C.glass,
              border: `1px solid ${C.glassBorder}`,
              borderRadius: 999,
              fontSize: 14, fontWeight: 500, color: C.white,
              opacity: pOpacity,
              transform: `translateY(${pY}px)`,
            }}>
              {pill}
            </div>
          );
        })}
      </div>

      {/* CTA */}
      <div style={{
        marginTop: 60,
        padding: '16px 48px',
        background: gradAccent,
        borderRadius: 999,
        fontSize: 20, fontWeight: 600, color: C.white,
        letterSpacing: 3,
        opacity: ctaOpacity,
        transform: `translateY(${ctaY}px) scale(${ctaScale})`,
        boxShadow: `0 8px 32px ${C.accent1}50`,
        cursor: 'pointer',
      }}>
        立即体验
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════

function App() {
  return (
    <Stage duration={15} width={1080} height={1920} bgColor={C.bg}>
      <Sprite start={0} end={3}>
        <SceneOpening />
      </Sprite>
      <Sprite start={3} end={6}>
        <SceneDualCamera />
      </Sprite>
      <Sprite start={6} end={9}>
        <SceneLayouts />
      </Sprite>
      <Sprite start={9} end={12}>
        <SceneRecording />
      </Sprite>
      <Sprite start={12} end={15}>
        <SceneClosing />
      </Sprite>
    </Stage>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
