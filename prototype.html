<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>双摄录像 - App原型预览</title>
  
  <!-- React + Babel pinned -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; }
    body { 
      font-family: -apple-system, 'SF Pro Text', 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    #root { flex: 1; width: 100%; max-width: 1400px; }
    
    .page-header {
      text-align: center;
      margin-bottom: 40px;
      color: #fff;
    }
    .page-header h1 {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .page-header p {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
    }
    
    .devices-container {
      display: flex;
      gap: 60px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 50px;
    }
    
    .device-label {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      font-weight: 500;
    }
    
    .guide-section {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 32px;
      max-width: 900px;
      margin: 0 auto;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .guide-section h2 {
      color: #fff;
      font-size: 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .guide-section h2::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 20px;
      background: linear-gradient(180deg, #667eea, #764ba2);
      border-radius: 2px;
    }
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
    }
    .feature-item {
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .feature-item h3 {
      color: #667eea;
      font-size: 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .feature-item p {
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      line-height: 1.6;
    }
    .emoji-icon {
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ============================================================
    // iOS Frame Component
    // ============================================================
    const iosFrameStyles = {
      wrapper: {
        display: 'inline-block',
        padding: 12,
        background: '#000',
        borderRadius: 60,
        boxShadow: '0 0 0 2px #1f2937, 0 20px 60px rgba(0,0,0,0.4)',
        position: 'relative',
      },
      screen: {
        position: 'relative',
        borderRadius: 48,
        overflow: 'hidden',
        background: '#fff',
      },
      statusBar: {
        position: 'absolute',
        top: 0,
        left: 0,
        right: 0,
        height: 54,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'space-between',
        padding: '0 32px 0 32px',
        fontSize: 16,
        fontWeight: 600,
        fontFamily: '-apple-system, "SF Pro Text", sans-serif',
        zIndex: 20,
        pointerEvents: 'none',
      },
      dynamicIsland: {
        position: 'absolute',
        top: 12,
        left: '50%',
        transform: 'translateX(-50%)',
        width: 124,
        height: 36,
        background: '#000',
        borderRadius: 999,
        zIndex: 30,
      },
      statusIcons: {
        display: 'flex',
        alignItems: 'center',
        gap: 6,
      },
      signalIcon: {
        display: 'flex',
        alignItems: 'flex-end',
        gap: 2,
        height: 12,
      },
      signalBar: {
        width: 3,
        background: 'currentColor',
        borderRadius: 1,
      },
      batteryIcon: {
        width: 26,
        height: 12,
        border: '1.5px solid currentColor',
        borderRadius: 3,
        padding: 1,
        position: 'relative',
        opacity: 0.8,
      },
      batteryCap: {
        position: 'absolute',
        top: 3,
        right: -3,
        width: 2,
        height: 6,
        background: 'currentColor',
        borderRadius: '0 1px 1px 0',
      },
      content: {
        position: 'absolute',
        top: 54,
        left: 0,
        right: 0,
        bottom: 34,
        overflow: 'hidden',
      },
      homeIndicator: {
        position: 'absolute',
        bottom: 10,
        left: '50%',
        transform: 'translateX(-50%)',
        width: 140,
        height: 5,
        background: 'rgba(255,255,255,0.5)',
        borderRadius: 999,
        zIndex: 10,
      },
    };

    function IosFrame({ children, width = 393, height = 852, time = '9:41', battery = 85, darkMode = true }) {
      const textColor = darkMode ? '#fff' : '#000';
      return (
        <div style={iosFrameStyles.wrapper}>
          <div style={{ ...iosFrameStyles.screen, width, height, background: darkMode ? '#000' : '#fff' }}>
            <div style={{ ...iosFrameStyles.statusBar, color: textColor }}>
              <span>{time}</span>
              <div style={iosFrameStyles.statusIcons}>
                <div style={iosFrameStyles.signalIcon}>
                  <div style={{ ...iosFrameStyles.signalBar, height: 4 }} />
                  <div style={{ ...iosFrameStyles.signalBar, height: 6 }} />
                  <div style={{ ...iosFrameStyles.signalBar, height: 9 }} />
                  <div style={{ ...iosFrameStyles.signalBar, height: 11 }} />
                </div>
                <svg width="16" height="12" viewBox="0 0 16 12" fill="none" style={{ color: textColor }}>
                  <path d="M8 11.5a1 1 0 100-2 1 1 0 000 2z" fill="currentColor" />
                  <path d="M3 7.5a7 7 0 0110 0" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinecap="round" />
                  <path d="M1 4.5a11 11 0 0114 0" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinecap="round" opacity="0.7" />
                </svg>
                <div style={iosFrameStyles.batteryIcon}>
                  <div style={{ width: `${battery}%`, height: '100%', background: 'currentColor', borderRadius: 1, opacity: 0.9 }} />
                  <div style={iosFrameStyles.batteryCap} />
                </div>
              </div>
            </div>
            <div style={iosFrameStyles.dynamicIsland} />
            <div style={iosFrameStyles.content}>{children}</div>
            <div style={iosFrameStyles.homeIndicator} />
          </div>
        </div>
      );
    }

    // ============================================================
    // Design Tokens
    // ============================================================
    const Design = {
      accent: 'rgba(102, 126, 234, 0.85)',
      recordRed: 'rgb(242, 64, 76)',
      glass: 'rgba(255,255,255,0.12)',
      glassBorder: 'rgba(255,255,255,0.25)',
      pillShadow: 'rgba(0,0,0,0.15)',
    };

    // ============================================================
    // Top Control Bar
    // ============================================================
    function TopBarButton({ icon, isActive, onClick }) {
      return (
        <button onClick={onClick} style={{
          width: 42, height: 42,
          background: 'rgba(255,255,255,0.08)',
          border: '1px solid rgba(255,255,255,0.15)',
          borderRadius: 999,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          cursor: 'pointer',
          boxShadow: '0 4px 12px rgba(0,0,0,0.1)',
          transition: 'all 0.2s',
        }}>
          <span style={{ fontSize: 16, color: isActive ? '#FFD60A' : '#fff' }}>{icon}</span>
        </button>
      );
    }

    function TopControlBar({ isFlashOn, onFlashToggle, onSettings }) {
      return (
        <div style={{
          position: 'absolute', top: 0, left: 0, right: 0,
          height: 120,
          background: 'linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%)',
          zIndex: 10,
          display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start',
          padding: '60px 20px 0',
        }}>
          <TopBarButton icon="⚡" isActive={isFlashOn} onClick={onFlashToggle} />
          <TopBarButton icon="⚙️" isActive={false} onClick={onSettings} />
        </div>
      );
    }

    // ============================================================
    // Camera Preview (Simulated)
    // ============================================================
    function CameraPreview() {
      return (
        <div style={{
          position: 'absolute', top: 0, left: 0, right: 0, bottom: 0,
          background: 'linear-gradient(135deg, #2d5a3d 0%, #1a3a2a 50%, #0d2818 100%)',
        }}>
          {/* Simulated scenery */}
          <div style={{
            position: 'absolute', bottom: 0, left: 0, right: 0, height: '60%',
            background: 'linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.4) 100%'),
          }} />
          {/* Trees */}
          <div style={{ position: 'absolute', bottom: '30%', left: '10%', width: 60, height: 120, background: 'linear-gradient(180deg, #2d5a3d, #1a3a2a)', borderRadius: '50% 50% 0 0' }} />
          <div style={{ position: 'absolute', bottom: '25%', right: '15%', width: 80, height: 160, background: 'linear-gradient(180deg, #3d6a4d, #2d5a3d)', borderRadius: '50% 50% 0 0' }} />
        </div>
      );
    }

    function FrontCameraOverlay({ isDragging }) {
      return (
        <div style={{
          position: 'absolute',
          right: 16, bottom: 140,
          width: 120, height: 160,
          borderRadius: 16,
          overflow: 'hidden',
          border: `${isDragging ? 3 : 2}px solid ${isDragging ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.3)'}`,
          boxShadow: `0 8px 24px rgba(0,0,0,0.3)${isDragging ? ', 0 0 20px rgba(255,255,255,0.15)' : ''}`,
          transition: 'all 0.2s',
          zIndex: 5,
        }}>
          <div style={{
            width: '100%', height: '100%',
            background: 'linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%)',
          }}>
            <div style={{ padding: 8, fontSize: 10, color: '#fff', textAlign: 'center' }}>前置摄像头</div>
          </div>
        </div>
      );
    }

    // ============================================================
    // Recording Indicator
    // ============================================================
    function RecordingIndicator({ duration }) {
      return (
        <div style={{
          position: 'absolute',
          bottom: 130, left: '50%', transform: 'translateX(-50%)',
          display: 'flex', alignItems: 'center', gap: 8,
          padding: '10px 20px',
          background: 'rgba(0,0,0,0.5)',
          backdropFilter: 'blur(20px)',
          borderRadius: 999,
          border: '1px solid rgba(255,255,255,0.1)',
          zIndex: 15,
        }}>
          <div style={{
            width: 10, height: 10, borderRadius: '50%',
            background: Design.recordRed,
            boxShadow: '0 0 8px ' + Design.recordRed,
          }} />
          <span style={{ color: '#fff', fontSize: 14, fontWeight: 600, fontFamily: 'monospace' }}>{duration}</span>
        </div>
      );
    }

    // ============================================================
    // Layout Toolbar
    // ============================================================
    const layouts = [
      { id: 'pip', name: '画中画', icon: '◻️' },
      { id: 'side', name: '左右', icon: '⬜' },
      { id: 'topBottom', name: '上下', icon: '▬' },
      { id: 'diagonal', name: '对角', icon: '🗃' },
      { id: 'focusBack', name: '后置', icon: '📷' },
      { id: 'focusFront', name: '前置', icon: '🤳' },
    ];

    function LayoutToolbar({ currentLayout, onLayoutChange }) {
      return (
        <div style={{
          position: 'absolute', bottom: 90, left: 0, right: 0,
          height: 70,
          background: 'rgba(0,0,0,0.4)',
          backdropFilter: 'blur(20px)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          gap: 8,
          zIndex: 10,
          overflowX: 'auto',
        }}>
          {layouts.map(layout => (
            <button key={layout.id} onClick={() => onLayoutChange(layout.id)}
              style={{
                minWidth: 52, height: 52,
                background: currentLayout === layout.id
                  ? 'linear-gradient(135deg, rgba(102,126,234,0.7), rgba(118,75,162,0.5))'
                  : 'rgba(255,255,255,0.08)',
                border: currentLayout === layout.id ? '2px solid rgba(102,126,234,0.6)' : '1px solid rgba(255,255,255,0.1)',
                borderRadius: 14,
                display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                gap: 4,
                cursor: 'pointer',
                transition: 'all 0.2s',
                padding: '4px 8px',
              }}>
              <span style={{ fontSize: 16 }}>{layout.icon}</span>
              <span style={{
                fontSize: 9, fontWeight: currentLayout === layout.id ? 600 : 400,
                color: currentLayout === layout.id ? '#fff' : 'rgba(255,255,255,0.6)',
              }}>{layout.name}</span>
            </button>
          ))}
        </div>
      );
    }

    // ============================================================
    // Record Button
    // ============================================================
    function RecordButton({ isRecording, onClick }) {
      return (
        <button onClick={onClick} style={{
          width: 72, height: 72,
          background: 'transparent',
          border: 'none',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          cursor: 'pointer',
          position: 'relative',
          zIndex: 20,
        }}>
          {/* Outer ring */}
          <div style={{
            position: 'absolute',
            width: 72, height: 72,
            borderRadius: '50%',
            border: isRecording ? `2px solid ${Design.recordRed}` : '2px solid rgba(255,255,255,0.2)',
            opacity: isRecording ? 0.4 : 1,
            transition: 'all 0.3s',
          }} />
          {/* Inner button */}
          <div style={{
            width: isRecording ? 32 : 58,
            height: isRecording ? 32 : 58,
            borderRadius: isRecording ? 8 : '50%',
            background: Design.recordRed,
            transition: 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)',
            boxShadow: `0 0 20px ${Design.recordRed}`,
          }} />
        </button>
      );
    }

    // ============================================================
    // Bottom Control Bar
    // ============================================================
    function BottomControlBar({ isRecording, onRecord, onSwitchCamera, onGallery }) {
      return (
        <div style={{
          position: 'absolute', bottom: 0, left: 0, right: 0,
          height: 90,
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '0 36px',
          zIndex: 10,
        }}>
          {/* Left button */}
          <button onClick={onSwitchCamera} style={{
            width: 50, height: 50,
            background: 'rgba(255,255,255,0.1)',
            border: '1px solid rgba(255,255,255,0.15)',
            borderRadius: 14,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            cursor: 'pointer',
          }}>
            <span style={{ fontSize: 20 }}>🔄</span>
          </button>

          {/* Record button */}
          <RecordButton isRecording={isRecording} onClick={onRecord} />

          {/* Right button */}
          <button onClick={onGallery} style={{
            width: 50, height: 50,
            background: 'rgba(255,255,255,0.1)',
            border: '1px solid rgba(255,255,255,0.15)',
            borderRadius: 14,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            cursor: 'pointer',
          }}>
            <span style={{ fontSize: 20 }}>🖼</span>
          </button>
        </div>
      );
    }

    // ============================================================
    // Main App Screen
    // ============================================================
    function DualCameraApp() {
      const [isRecording, setIsRecording] = useState(false);
      const [duration, setDuration] = useState('00:00');
      const [currentLayout, setCurrentLayout] = useState('pip');
      const [isDragging, setIsDragging] = useState(false);

      // Timer effect
      useEffect(() => {
        let interval;
        if (isRecording) {
          let seconds = 0;
          interval = setInterval(() => {
            seconds++;
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            setDuration(`${m}:${s}`);
          }, 1000);
        } else {
          setDuration('00:00');
        }
        return () => clearInterval(interval);
      }, [isRecording]);

      return (
        <div style={{
          width: '100%', height: '100%',
          background: '#000',
          position: 'relative',
          overflow: 'hidden',
        }}>
          <TopControlBar
            isFlashOn={false}
            onFlashToggle={() => {}}
            onSettings={() => {}}
          />
          <CameraPreview />
          <FrontCameraOverlay isDragging={isDragging} />
          {isRecording && <RecordingIndicator duration={duration} />}
          <LayoutToolbar currentLayout={currentLayout} onLayoutChange={setCurrentLayout} />
          <BottomControlBar
            isRecording={isRecording}
            onRecord={() => setIsRecording(!isRecording)}
            onSwitchCamera={() => {}}
            onGallery={() => {}}
          />
        </div>
      );
    }

    // ============================================================
    // App with Guide
    // ============================================================
    function App() {
      return (
        <div>
          <div className="page-header">
            <h1>双摄录像 · App原型</h1>
            <p>iOS双摄像头录像应用 · 清新毛玻璃风格</p>
          </div>

          <div className="devices-container">
            <div>
              <IosFrame width={393} height={852} time="9:41" battery={85}>
                <DualCameraApp />
              </IosFrame>
              <div className="device-label">待机状态</div>
            </div>
          </div>

          <div className="guide-section">
            <h2>使用指南</h2>
            <div className="feature-grid">
              <div className="feature-item">
                <h3><span className="emoji-icon">📹</span> 开始录制</h3>
                <p>点击中央红色录制按钮，计时器开始计时，再次点击停止录制并保存到相册。</p>
              </div>
              <div className="feature-item">
                <h3><span className="emoji-icon">🔄</span> 切换摄像头</h3>
                <p>点击左侧按钮可切换前后摄像头的主次位置关系。</p>
              </div>
              <div className="feature-item">
                <h3><span className="emoji-icon">🎨</span> 6种布局模式</h3>
                <p>底部工具栏提供画中画、左右分屏、上下分屏、对角布局、后置主屏、前置主屏6种预设布局。</p>
              </div>
              <div className="feature-item">
                <h3><span className="emoji-icon">✨</span> 拖拽调整</h3>
                <p>前置摄像头小窗口可自由拖拽位置，松开后自动吸附到新位置。</p>
              </div>
              <div className="feature-item">
                <h3><span className="emoji-icon">⚡</span> 闪光灯控制</h3>
                <p>点击顶部左侧按钮可开启/关闭后置摄像头闪光灯。</p>
              </div>
              <div className="feature-item">
                <h3><span className="emoji-icon">🖼</span> 相册入口</h3>
                <p>点击右侧按钮可打开相册，查看已录制的双摄像头视频。</p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
